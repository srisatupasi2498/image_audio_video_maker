name: 🎬 Generate Videos

run-name: 🎬 ${{ inputs.language }} Videos (${{ inputs.start }}-${{ inputs.end }})

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Select Language'
        required: true
        type: choice
        options:
          - ENGLISH
          - KANNADA
          - HINDI
          - TAMIL
          - TELUGU
          - MARATHI
      start:
        description: 'Start file number'
        required: true
        type: string
        default: '1'
      end:
        description: 'End file number'
        required: true
        type: string
        default: '3'

jobs:
  generate-videos:
    name: Generate ${{ inputs.language }} Videos (${{ inputs.start }}-${{ inputs.end }})
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Install System Dependencies
        run: |
          echo "Installing gdown..."
          brew install gdown
          echo "Installing ffmpeg..."
          brew install ffmpeg
          echo "Installing Google Drive API dependencies..."
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          echo "✓ All dependencies installed"

      - name: 📥 Download Media from Google Drive
        run: |
          echo "Downloading ${{ inputs.language }} media files (${{ inputs.start }}-${{ inputs.end }})"
          python3 download_from_gdrive.py \
            --language ${{ inputs.language }} \
            --start ${{ inputs.start }} \
            --end ${{ inputs.end }} \
            --background

      - name: 📊 Verify Downloaded Files
        run: |
          echo "Images in input folder:"
          ls -lh input/images/ || echo "No images folder or empty"
          echo ""
          echo "Audio in input folder:"
          ls -lh input/audio/ || echo "No audio folder or empty"
          echo ""
          echo "Background music:"
          ls -lh input/background/ || echo "No background music"

      - name: 🎬 Generate Videos
        run: |
          echo "Starting video generation..."
          python3 generate_videos_with_bg.py
          echo "✓ Video generation complete"

      - name: 📊 List Generated Videos
        run: |
          echo "Generated videos:"
          ls -lh output/*.mp4 || echo "No videos generated"

      # Google Drive Upload (requires SERVICE_ACCOUNT_SECRET secret)
      - name: 📤 Upload Videos to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_SECRET }}
        run: |
          echo "📤 Uploading videos to Google Drive..."
          python3 upload_to_gdrive_simple.py ${{ inputs.language }}
          echo "✓ Upload complete"

      - name: 📦 Upload Videos as Artifact (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos-${{ inputs.language }}-${{ inputs.start }}-${{ inputs.end }}
          path: output/*.mp4
          retention-days: 30
          if-no-files-found: warn

      - name: ✅ Summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ SUCCESS!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Language: ${{ inputs.language }}"
          echo "Range: ${{ inputs.start }} to ${{ inputs.end }}"
          echo ""
          echo "📥 Download your videos:"
          echo "   Go to Actions → This workflow run → Artifacts section"
          echo "   Click: generated-videos-${{ inputs.language }}-${{ inputs.start }}-${{ inputs.end }}"
          echo ""
          echo "Videos will be available for 30 days"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ❌ Failure Notice
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ WORKFLOW FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Check the logs above for error details"
          echo "Common issues:"
          echo "  - Google Drive folder IDs not configured"
          echo "  - Files not found in Google Drive"
          echo "  - Authentication token expired"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
